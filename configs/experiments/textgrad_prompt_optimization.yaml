experiment_name: textgrad_prompt_optimization
task_type: impression
generator_config: configs/models/medgemma.yaml
critic_config: configs/models/qwen35_9b_critic.yaml
split_csv: outputs/splits_chexbert/split_seed_0.csv
dev_sample_size: 64
max_epochs: 4
style_profile_init: |
  Produce a concise chest X-ray impression.
  Mention clinically important abnormal findings.
  Avoid inventing findings not supported by the image.
acceptance_rule:
  require_lesion_preservation_gate: true
  min_lesion_agreement_vs_baseline: 0.95
  max_clinical_f1_drop: 0.03
  reject_if_normal_collapse_increases: true
  reject_if_new_hallucination_increases: true

# TextGrad candidate prompt가 MedGemma 기본 병변 탐지 능력을 망치지 않는지 보는 gate.
# production에서는 같은 dev uid에 대해 baseline/candidate localization score를 만든 뒤 score_csv에 넣는다.
lesion_preservation_gate:
  enabled: true
  mode: noninferiority      # options: noninferiority, equivalence
  metric_name: lesion_localization_score
  margin: 0.03              # candidate mean score가 baseline보다 3pp 이상 낮으면 reject
  alpha: 0.05
  min_samples: 30
  score_csv: null           # production 예: outputs/prompt_optimization/lesion_preservation_scores.csv
  baseline_score_column: baseline_lesion_score
  candidate_score_column: candidate_lesion_score
output_dir: outputs/prompt_optimization

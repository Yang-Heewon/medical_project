mode: real_full
seed: 0
seeds: [0, 1, 2, 3]
top_k: 5
max_inference_samples: null
data_csv_override: outputs/production/preprocessed/indiana_paired_samples_chexbert.csv

configs:
  data: configs/data/indiana.yaml
  split: configs/split/stratified_70_30.yaml
